<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CSS Modern - Media Pembelajaran Interaktif</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container justify-content-center">
        <a class="navbar-brand p-0" href="#">
            <img src="logonn.png" alt="Logo" class="logo-3d" width="80" height="80">
        </a>
        <button class="btn btn-outline-secondary rounded-pill position-absolute end-0 me-3" id="darkModeToggle">
            <i class="bi bi-moon-fill"></i> <span class="d-none d-sm-inline">Mode Gelap</span>
        </button>
    </div>
</nav>
    <main>
        <section id="landingPage" class="landing-section">
            <div class="container text-center">
                <div class="hero-card">
                    <h1 class="display-4 fw-bold mb-4">Desain Tampilan Website dengan <span style="color: var(--toska);">CSS Modern</span> dan <span style="color: var(--orange);">Responsif</span></h1>
                    <p class="lead mb-5">Pelajari teknik CSS terkini melalui 16 slide interaktif dengan efek visual unik di setiap slide.</p>
                    <button id="mulaiBelajarBtn" class="btn btn-mulai">Mulai Belajar <i class="bi bi-arrow-right-circle ms-2"></i></button>
                </div>
            </div>
        </section>
        <section id="slideContainer" style="display: none;">
            <div class="container py-4">
                <div class="progress-bar-wrapper mb-4">
                    <div class="d-flex justify-content-between small mb-1"><span>Kemajuan Belajar</span><span id="progressPercent">0%</span></div>
                    <div class="progress" style="height: 10px;"><div id="progressFill" class="progress-bar" style="width: 0%;"></div></div>
                </div>
                <div class="slide-card" id="slideCard">
                    <div class="slide-content" id="slideContent"></div>
                </div>
                <div class="navigation-wrapper mt-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                        <button id="prevBtn" class="btn btn-nav" disabled><i class="bi bi-chevron-left"></i> Previous</button>
                        <div class="slide-indicator"><span id="currentSlide">1</span> / <span id="totalSlides">16</span></div>
                        <div class="d-flex gap-2"><button id="repeatBtn" class="btn btn-outline-repeat"><i class="bi bi-arrow-repeat"></i> Ulangi</button><button id="nextBtn" class="btn btn-nav">Next <i class="bi bi-chevron-right"></i></button></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div style="text-align: center; margin: 30px 0;">
    <button class="rajin-btn" id="rajinBtn">💰 Ambil uang disini! 💰</button>
    <div id="pesanAmbil" class="ambil-uang">📚 Rajin kirim tugas donk</div>
</div>
    <footer class="text-center py-4 mt-4 border-top"><p class="small mb-0">&copy; 2026 Media Pembelajaran Desain Web - CSS Modern Interaktif</p></footer>
    <script src="script.js"></script>

</div>
</body>
</html>
